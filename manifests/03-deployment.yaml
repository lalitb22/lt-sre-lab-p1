apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: sre-practice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx-container
        image: nginx:alpine
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "64Mi"
            cpu: "200m"
# --- NEW SECTION: INJECTING THE SECRET ---
        env:
        - name: PROD_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-credentials
              key: api-token
        # -----------------------------------------            
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: web-content
